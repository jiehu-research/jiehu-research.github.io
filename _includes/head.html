<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title and page.title != "Home" %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.tagline }}{% endif %}</title>
<meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
<meta name="author" content="{{ site.author.name }}">
<meta name="theme-color" content="#1d4ed8">

<link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.url }}">

<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | prepend: site.baseurl }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | prepend: site.baseurl }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | prepend: site.baseurl }}">

<meta property="og:title"        content="{{ page.title | default: site.title }}">
<meta property="og:description"  content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 200 }}">
<meta property="og:image"        content="{{ '/assets/images/profile.png' | prepend: site.url }}">
<meta property="og:url"          content="{{ page.url | prepend: site.url }}">
<meta property="og:type"         content="website">
<meta name="twitter:card"        content="summary">

<script>
  (function () {
    try {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    } catch (e) {}
  })();
</script>

<link rel="stylesheet" href="{{ '/assets/css/main.css' | prepend: site.baseurl }}">

<link rel="alternate" type="application/atom+xml" title="{{ site.title }} — Blog"
      href="{{ '/feed.xml' | prepend: site.baseurl | prepend: site.url }}">

{% if page.math or page.layout == 'post' %}
<script>
  window.MathJax = {
    tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
    options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
{% endif %}

{% seo %}
