# ---------- 2025 ----------
- title: "Beyond Self-Repellent Kernels: History-Driven Target Towards Efficient Nonlinear MCMC on General Graphs"
  authors: "<strong>Jie Hu</strong>, Yi-Ting Ma, Do Young Eun"
  venue: "International Conference on Machine Learning (ICML)"
  year: 2025
  location: "Vancouver, Canada"
  pdf: "https://arxiv.org/pdf/2505.18300"
  abstract: >
    We propose a history-driven target (HDT) framework in MCMC to improve any
    random walk algorithm on discrete state spaces, such as general undirected
    graphs, for efficient sampling from a target distribution. Recent innovations
    like the self-repellent random walk (SRRW) achieve near-zero variance by
    prioritizing under-sampled states through transition-kernel modifications,
    but suffer high computational overhead and require time-reversibility. HDT
    instead replaces the target distribution itself with a history-dependent one,
    preserving lightweight implementation while achieving compatibility with both
    reversible and non-reversible MCMC samplers and retaining unbiased samples
    with near-zero variance.
  badges:
    - oral
  featured: true

# ---------- 2024 ----------
- title: "Does Worst-Performing Agent Lead the Pack? Analyzing Agent Dynamics in Unified Distributed SGD"
  authors: "<strong>Jie Hu</strong>, Yi-Ting Ma, Do Young Eun"
  venue: "Advances in Neural Information Processing Systems (NeurIPS)"
  year: 2024
  location: "Vancouver, Canada"
  pdf: "https://arxiv.org/pdf/2409.17499"
  abstract: >
    We conduct an asymptotic analysis of Unified Distributed SGD (UD-SGD)
    spanning decentralized SGD, local SGD, and Federated Learning patterns,
    and assess how different sampling strategies (i.i.d., shuffling, Markovian)
    affect convergence speed via the limiting covariance matrix. Our results
    extend existing theories on linear speedup and asymptotic network independence,
    and reveal that a few agents using highly efficient sampling can match or
    surpass a majority using moderately improved strategies, providing new insights
    beyond worst-agent analyses.

- title: "Accelerating Distributed Stochastic Optimization via Self-Repellent Random Walks"
  authors: "<strong>Jie Hu</strong>, Vishwaraj Doshi, Do Young Eun"
  venue: "International Conference on Learning Representations (ICLR)"
  year: 2024
  location: "Vienna, Austria"
  pdf: "https://arxiv.org/pdf/2401.09665"
  abstract: >
    We replace the standard linear Markovian token in random-walk-based distributed
    SGD by a Self-Repellent Random Walk (SRRW) - a nonlinear Markov chain that is
    less likely to revisit recently visited states. Our SA-SRRW algorithm achieves
    almost-sure convergence and a CLT, with asymptotic covariance always smaller
    than that of an algorithm driven by the base Markov chain and decreasing at
    rate O(1/alpha^2) - amplifying SRRW's benefit in the stochastic optimization context.
  badges:
    - oral
  featured: true

- title: "Central Limit Theorem for Two-Timescale Stochastic Approximation with Markovian Noise: Theory and Applications"
  authors: "<strong>Jie Hu</strong>, Vishwaraj Doshi, Do Young Eun"
  venue: "International Conference on Artificial Intelligence and Statistics (AISTATS)"
  year: 2024
  location: "Valencia, Spain"
  pdf: "https://arxiv.org/pdf/2401.09339"
  abstract: >
    We conduct an in-depth asymptotic analysis of Two-Timescale Stochastic
    Approximation (TTSA) under controlled Markovian noise via central limit
    theorem (CLT), uncovering coupled dynamics not addressed by previous CLTs
    that only handled martingale-difference noise. We extend efficient sampling
    strategies from vanilla SGD to a wider TTSA context for distributed learning,
    and apply the CLT to GTD algorithms with nonlinear function approximation.

# ---------- 2023 ----------
- title: "Self-Repellent Random Walks on General Graphs - Achieving Minimal Sampling Variance via Nonlinear Markov Chains"
  authors: "Vishwaraj Doshi, <strong>Jie Hu</strong>, Do Young Eun"
  venue: "International Conference on Machine Learning (ICML)"
  year: 2023
  location: "Honolulu, HI"
  pdf: "https://arxiv.org/pdf/2305.05097"
  abstract: >
    We design a self-repellent random walk (SRRW) parameterized by alpha > 0 that is
    less likely to transition to highly visited nodes. We prove almost-sure
    convergence of the empirical distribution to the target stationary distribution,
    and a CLT showing that stronger repellence (larger alpha) yields strictly smaller
    asymptotic covariance in the Loewner order. For SRRW-driven MCMC, the decrease
    in asymptotic sampling variance is O(1/alpha), eventually going to zero.
  badges:
    - award: "Outstanding Paper Award"
  featured: true

# ---------- 2022 ----------
- title: "Efficiency Ordering of Stochastic Gradient Descent"
  authors: "<strong>Jie Hu</strong>, Vishwaraj Doshi, Do Young Eun"
  venue: "Advances in Neural Information Processing Systems (NeurIPS)"
  year: 2022
  location: "New Orleans, LA"
  pdf: "https://arxiv.org/pdf/2209.07446"
  abstract: >
    We employ the notion of efficiency ordering - well-analyzed for MCMC samplers -
    for SGD algorithms via Loewner ordering of asymptotic covariance matrices. We
    show that input sequences more efficient for MCMC sampling lead to smaller
    covariance for SGD in the limit, and demonstrate this for non-Markovian
    processes whose mixing-time bounds are intractable. Empirically the ordering
    extends to accelerated SGD and Adam.

- title: "Bi-SIS Epidemics on Graphs: Quantitative Analysis of Coexistence Equilibria"
  authors: "Vishwaraj Doshi, <strong>Jie Hu</strong>, Do Young Eun"
  venue: "IEEE Conference on Decision and Control (CDC)"
  year: 2022
  location: "Cancun, Mexico"
  pdf: "https://arxiv.org/pdf/2209.07304"
  abstract: >
    We consider two SIS-type viruses competing over overlaid graphs and provide
    the first quantitative analysis of non-trivial coexistence equilibria, proving
    monotonicity in effective infection rates and giving upper bounds in terms of
    spectral radii of the underlying graphs and positive equilibria of single-virus
    systems.

- title: "Minimizing File Transfer Time in Opportunistic Spectrum Access Model"
  authors: "<strong>Jie Hu</strong>, Vishwaraj Doshi, Do Young Eun"
  venue: "IEEE Transactions on Mobile Computing"
  year: 2022
  pdf: "https://arxiv.org/pdf/2210.02557"
  abstract: >
    We explicitly minimize file-transfer time over heterogeneous-rate Bernoulli
    channels in the OSA model - showing that max-throughput policy does not
    minimize file-transfer time in general. We give static and dynamic optimal
    policies, an MIP reformulation that drastically cuts compute time, and a
    heuristic with online implementation under unknown channel parameters.

# ---------- 2021 ----------
- title: "Opportunistic Spectrum Access: Does Maximizing Throughput Minimize File Transfer Time?"
  authors: "<strong>Jie Hu</strong>, Vishwaraj Doshi, Do Young Eun"
  venue: "International Symposium on Modeling and Optimization in Mobile, Ad Hoc, and Wireless Networks (WiOpt)"
  year: 2021
  location: "Philadelphia, PA"
  pdf: "https://arxiv.org/pdf/2109.11624"
  abstract: >
    We show that maximizing long-term throughput in Opportunistic Spectrum Access
    does not minimize file transfer time in general - especially for small files -
    and provide static- and dynamic-optimal policies via stochastic shortest-path
    formulation, with an online algorithm and regret bound.

# ---------- 2020 ----------
- title: "Performance Analysis and Improvement on DSRC Application for V2V Communication"
  authors: "Liu Cao, Hao Yin, <strong>Jie Hu</strong>, Lyutianyang Zhang"
  venue: "IEEE Vehicular Technology Conference (VTC2020-Fall)"
  year: 2020
  location: "Victoria, Canada"
  pdf: "https://arxiv.org/pdf/2102.07023"
  abstract: >
    We analyze packet-delivery ratio and mean delay of DSRC-based V2V
    communication under IEEE 802.11p, and develop the Semi-persistent Contention
    Density Control scheme that increases PDR by >10% and decreases mean delay
    by >50% in heavy-load scenarios.

