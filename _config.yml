# =============================================================
#  Site configuration
#  Edit anything marked  EDIT  -- the rest can stay as-is.
# =============================================================

# EDIT  Basic info
title:       "Jie Hu"
tagline:     "Assistant Professor - Oakland University"
description: "Research on machine learning theory, distributed optimization, and graph sampling."
baseurl:     ""
url:         "https://jiehu-research.github.io"
repository:  "jiehu-research/jiehu-research.github.io"
branch:      "master"   # branch GitHub Pages serves from (used for the "edit on GitHub" links)

# EDIT  About you
author:
  name:           "Jie Hu"
  name_zh:        "胡杰"
  pronouns:       "he/him"
  title:          "Assistant Professor"
  department:     "Department of Computer Science and Engineering"
  university:     "Oakland University"
  university_url: "https://www.oakland.edu/"
  department_url: "https://www.oakland.edu/cse/"
  location:       "Rochester, MI"
  email:          "jiehu@oakland.edu"

# EDIT  Social / academic links  (leave "" to hide)
links:
  email:            "jiehu@oakland.edu"
  google_scholar:   "https://scholar.google.com/citations?hl=en&user=WrXZ9NMAAAAJ"
  semantic_scholar: "https://www.semanticscholar.org/author/Jie-Hu/2279761166"
  dblp:             "https://dblp.org/pid/90/5064-27.html"
  orcid:            "https://orcid.org/0000-0002-0165-3738"
  github:           "https://github.com/jiehu-research"
  linkedin:         ""
  cv:               "/assets/files/cv.pdf"

# EDIT  Recruiting blurb shown on the home page (set show: false to hide)
recruiting:
  show: true
  text: >
    I am recruiting **PhD students** to start in **Winter / Fall 2026**
    with expertise in applied probability, optimization, machine-learning
    algorithms, or Markov chain Monte Carlo. Please email me with your CV
    and a brief description of your research interests.

# EDIT  How many news items show on the front page
homepage:
  news_count: 3

# =============================================================
#  Build settings (rarely edited)
# =============================================================
markdown:    kramdown
highlighter: rouge
permalink:   /blog/:year/:month/:day/:title/

kramdown:
  input:              GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

paginate:      6
paginate_path: "/blog/page:num/"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - tools/
  - Gemfile
  - Gemfile.lock
  - "*.py"
  - README.md
  - MAINTAINER.md
  - .sass-cache/
  - .jekyll-cache/
  - .jekyll-metadata
  - vendor/
  - node_modules/
